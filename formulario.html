<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Frete - Site SGT</title>
<style>
  :root{
    --sgt-yellow:#FFDB00;
    --sgt-gold:#F8AF18;
    --sgt-red:#E6482E;
    --sgt-black:#161513;
    --sgt-ink:#2B2621;
    --sgt-bg:#FAF7F1;
    --sgt-card:#FFFFFF;
    --sgt-line:#E8E1D3;
    --sgt-muted:#8A8275;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--sgt-bg);
    color:var(--sgt-ink);
    min-height:100vh;
  }

  /* ---------- HEADER ---------- */
  header{
    background:linear-gradient(120deg,var(--sgt-yellow) 0%,var(--sgt-gold) 55%,#F2A20C 100%);
    padding:18px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:0 2px 14px rgba(0,0,0,0.08);
  }
  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .brand img{
    height:46px;
    width:auto;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,0.15));
  }
  .brand-title{
    font-size:15px;
    font-weight:700;
    color:var(--sgt-black);
    letter-spacing:0.2px;
  }
  .brand-title span{
    display:block;
    font-size:11px;
    font-weight:600;
    color:#5c4c12;
    letter-spacing:0.6px;
    text-transform:uppercase;
  }
  .btn-sheet{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--sgt-black);
    color:#fff;
    border:none;
    padding:11px 18px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    transition:transform .15s ease, background .15s ease;
    text-decoration:none;
  }
  .btn-sheet:hover{ background:#000; transform:translateY(-1px); }
  .btn-sheet svg{ width:15px; height:15px; }

  /* ---------- LAYOUT ---------- */
  main{
    max-width:640px;
    margin:0 auto;
    padding:36px 20px 64px;
  }
  .page-title{
    text-align:center;
    margin-bottom:28px;
  }
  .page-title h1{
    font-size:24px;
    font-weight:800;
    color:var(--sgt-black);
    margin:0 0 4px;
  }
  .page-title p{
    margin:0;
    font-size:13px;
    color:var(--sgt-muted);
  }

  .card{
    background:var(--sgt-card);
    border:1px solid var(--sgt-line);
    border-radius:var(--radius);
    padding:30px 28px;
    box-shadow:0 10px 30px rgba(50,40,10,0.06);
  }

  .field{
    margin-bottom:18px;
    transition:opacity .2s ease;
  }
  .field label{
    display:block;
    font-size:12.5px;
    font-weight:700;
    color:var(--sgt-ink);
    margin-bottom:6px;
  }
  .field .hint{
    font-size:11px;
    font-weight:400;
    color:var(--sgt-muted);
    margin-left:4px;
  }
  input, select{
    width:100%;
    padding:11px 13px;
    border:1.5px solid var(--sgt-line);
    border-radius:9px;
    font-size:14px;
    font-family:inherit;
    color:var(--sgt-ink);
    background:#fff;
    transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;
  }
  input:focus, select:focus{
    outline:none;
    border-color:var(--sgt-gold);
    box-shadow:0 0 0 3px rgba(248,175,24,0.25);
  }
  input:disabled{
    background:#F4F2EC;
    color:#B4AB9B;
    cursor:not-allowed;
    border-color:var(--sgt-line);
  }
  .field.disabled label{ color:#B4AB9B; }

  .error-msg{
    font-size:11.5px;
    color:var(--sgt-red);
    font-weight:600;
    margin-top:5px;
    display:none;
  }
  .field.invalid input{
    border-color:var(--sgt-red);
    box-shadow:0 0 0 3px rgba(230,72,46,0.15);
  }
  .field.invalid .error-msg{ display:block; }

  .row-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }
  @media(max-width:480px){
    .row-2{ grid-template-columns:1fr; }
  }

  .submit-btn{
    width:100%;
    margin-top:8px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(120deg,var(--sgt-red),#c53a24);
    color:#fff;
    font-size:15px;
    font-weight:700;
    letter-spacing:0.2px;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .submit-btn:hover{ transform:translateY(-1px); box-shadow:0 8px 20px rgba(230,72,46,0.3); }
  .submit-btn:disabled{ opacity:.6; cursor:not-allowed; transform:none; box-shadow:none; }

  .status-msg{
    text-align:center;
    font-size:13px;
    font-weight:600;
    margin-top:14px;
    display:none;
  }
  .status-msg.show{ display:block; }
  .status-msg.ok{ color:#1E7A3D; }
  .status-msg.err{ color:var(--sgt-red); }

  /* ---------- MODAL ---------- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(22,21,19,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:50;
  }
  .overlay.show{ display:flex; }
  .modal{
    background:#fff;
    border-radius:16px;
    max-width:420px;
    width:100%;
    padding:26px 26px 22px;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    animation:pop .18s ease;
  }
  @keyframes pop{
    from{ opacity:0; transform:scale(.96) translateY(6px); }
    to{ opacity:1; transform:scale(1) translateY(0); }
  }
  .modal h2{
    margin:0 0 4px;
    font-size:17px;
    font-weight:800;
    color:var(--sgt-black);
  }
  .modal p.sub{
    margin:0 0 16px;
    font-size:12.5px;
    color:var(--sgt-muted);
  }
  .confirm-list{
    border-top:1px solid var(--sgt-line);
  }
  .confirm-row{
    display:flex;
    justify-content:space-between;
    gap:14px;
    padding:9px 0;
    border-bottom:1px solid var(--sgt-line);
    font-size:13px;
  }
  .confirm-row .k{ color:var(--sgt-muted); font-weight:600; }
  .confirm-row .v{ color:var(--sgt-ink); font-weight:600; text-align:right; }
  .modal-actions{
    display:flex;
    gap:10px;
    margin-top:22px;
  }
  .modal-actions button{
    flex:1;
    padding:12px;
    border-radius:9px;
    font-size:13.5px;
    font-weight:700;
    cursor:pointer;
    border:1.5px solid transparent;
  }
  .btn-corrigir{
    background:#fff;
    border-color:var(--sgt-line);
    color:var(--sgt-ink);
  }
  .btn-corrigir:hover{ background:#F4F2EC; }
  .btn-confirmar{
    background:var(--sgt-black);
    color:#fff;
  }
  .btn-confirmar:hover{ background:#000; }
</style>
</head>

<main>
  <div class="page-title">
    <h1>Controle de Frete - Site SGT</h1>
    <p>Preencha os dados do pedido para registrar o envio</p>
  </div>

  <div class="card">
    <form id="formFrete" novalidate>

      <div class="field">
        <label for="cliente">Cliente</label>
        <input type="text" id="cliente" required>
      </div>

      <div class="row-2">
        <div class="field">
          <label for="numeroPedido">Número do pedido</label>
          <input type="number" id="numeroPedido" min="0" step="1" required>
        </div>
        <div class="field">
          <label for="dataEnvio">Data de envio</label>
          <input type="date" id="dataEnvio" required>
        </div>
      </div>

      <div class="field">
        <label for="transportadora">Transportadora</label>
        <select id="transportadora" required>
          <option value="" disabled selected>Selecione...</option>
          <option value="Entrega Loja">Entrega Loja</option>
          <option value="Retirada Loja">Retirada Loja</option>
          <option value="Jadlog">Jadlog</option>
          <option value="Rodonaves">Rodonaves</option>
          <option value="Correios">Correios</option>
          <option value="Outro">Outro</option>
        </select>
      </div>

      <div class="field disabled" id="fieldOutro">
        <label for="outro">Outro <span class="hint">(especifique a transportadora)</span></label>
        <input type="text" id="outro" disabled>
      </div>

      <div class="field disabled" id="fieldRastreio">
        <label for="codigoRastreio">Código de rastreio <span class="hint">(Correios / Jadlog)</span></label>
        <input type="text" id="codigoRastreio" maxlength="30" disabled>
      </div>

      <div class="row-2">
        <div class="field disabled" id="fieldCpf">
          <label for="cpf">CPF <span class="hint">(Rodonaves)</span></label>
          <input type="text" id="cpf" placeholder="000.000.000-00" inputmode="numeric" maxlength="14" disabled>
          <div class="error-msg">CPF inválido</div>
        </div>
        <div class="field disabled" id="fieldNota">
          <label for="notaFiscal">Nota fiscal <span class="hint">(Rodonaves)</span></label>
          <input type="text" id="notaFiscal" inputmode="numeric" maxlength="10" disabled>
        </div>
      </div>

      <div class="row-2">
        <div class="field">
        <label for="prazo">Prazo (dias úteis) <span class="hint">(ou preencha a data ao lado)</span></label>
        <input type="text" id="prazo" inputmode="numeric" maxlength="2">
      </div>
      <div class="field">
      <label for="dataEntregaPrevista">Data de entrega (prevista) <span class="hint">(ou preencha o prazo)</span></label>
      <input type="date" id="dataEntregaPrevista">
  </div>
</div>

<div class="field">
  <label for="valorFrete">Valor do frete</label>
  <input type="text" id="valorFrete" inputmode="numeric" placeholder="R$ 0,00" required>
</div>

<div class="field">
  <label for="valorPago">Valor pago <span class="hint">(R$ 0,00 = grátis)</span></label>
  <input type="text" id="valorPago" inputmode="numeric" placeholder="R$ 0,00" required>
</div>

      <button type="submit" class="submit-btn" id="btnEnviar">Enviar dados</button>
      <div class="status-msg" id="statusMsg"></div>
    </form>
  </div>
</main>

<!-- MODAL DE CONFIRMAÇÃO -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Confirme os dados</h2>
    <p class="sub">Revise as informações antes de enviar para a planilha.</p>
    <div class="confirm-list" id="confirmList"></div>
    <div class="modal-actions">
      <button type="button" class="btn-corrigir" id="btnCorrigir">Corrigir</button>
      <button type="button" class="btn-confirmar" id="btnConfirmar">Enviar</button>
    </div>
  </div>
</div>

<script>
  // ===== SUBSTITUA PELA URL DO SEU WEB APP (Apps Script -> doPost) =====
  const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbwgvpbyi_L51uZSG_6XLfkcysZ4i7oq-bSU5FPY5x-g5pmMk399cILayfmXNFrU8Q5Y/exec";

  const form            = document.getElementById("formFrete");
  const transportadora  = document.getElementById("transportadora");
  const fieldOutro      = document.getElementById("fieldOutro");
  const fieldRastreio   = document.getElementById("fieldRastreio");
  const fieldCpf        = document.getElementById("fieldCpf");
  const fieldNota       = document.getElementById("fieldNota");
  const outroInput      = document.getElementById("outro");
  const rastreioInput   = document.getElementById("codigoRastreio");
  const cpfInput        = document.getElementById("cpf");
  const notaInput       = document.getElementById("notaFiscal");
  const prazoInput      = document.getElementById("prazo");
  const valorInput      = document.getElementById("valorFrete");
  const overlay         = document.getElementById("overlay");
  const confirmList     = document.getElementById("confirmList");
  const btnEnviar       = document.getElementById("btnEnviar");
  const btnCorrigir     = document.getElementById("btnCorrigir");
  const btnConfirmar    = document.getElementById("btnConfirmar");
  const statusMsg       = document.getElementById("statusMsg");
  const dataEntregaInput = document.getElementById("dataEntregaPrevista");

  // ---------- Habilita/desabilita campos conforme transportadora ----------
  function toggleField(fieldEl, inputEl, enabled){
    inputEl.disabled = !enabled;
    fieldEl.classList.toggle("disabled", !enabled);
    if(!enabled){
      inputEl.value = "";
      fieldEl.classList.remove("invalid");
    }
  }

  transportadora.addEventListener("change", () => {
    const v = transportadora.value;
    toggleField(fieldOutro, outroInput, v === "Outro" || v === "Entrega Loja" || v === "Retirada Loja");
    toggleField(fieldRastreio, rastreioInput, v === "Correios" || v === "Jadlog");
    toggleField(fieldCpf, cpfInput, v === "Rodonaves");
    toggleField(fieldNota, notaInput, v === "Rodonaves");
  });

  // ---------- Máscara de CPF ----------
  cpfInput.addEventListener("input", () => {
    let v = cpfInput.value.replace(/\D/g, "").slice(0, 11);
    if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, "$1.$2.$3-$4");
    else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3");
    else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, "$1.$2");
    cpfInput.value = v;
    document.getElementById("fieldCpf").classList.remove("invalid");
  });

  function cpfValido(){
    if (cpfInput.disabled) return true;
    const digits = cpfInput.value.replace(/\D/g, "");
    return digits.length === 0 || digits.length === 11;
  }

  // ---------- Nota fiscal: somente números ----------
  notaInput.addEventListener("input", () => {
    notaInput.value = notaInput.value.replace(/\D/g, "").slice(0, 10);
  });

  // ---------- Prazo: somente números, 2 dígitos ----------
  prazoInput.addEventListener("input", () => {
    prazoInput.value = prazoInput.value.replace(/\D/g, "").slice(0, 2);
  });

  // ---------- Máscara de valor monetário ----------
  function aplicarMascaraMoeda(input) {
    input.addEventListener("input", () => {
      let v = input.value.replace(/\D/g, "");
      if (!v) { input.value = ""; return; }
      v = (parseInt(v, 10) / 100).toFixed(2) + "";
      let [intPart, decPart] = v.split(".");
      intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
      input.value = "R$ " + intPart + "," + decPart;
    });
  }
  const valorPagoInput = document.getElementById("valorPago");
  aplicarMascaraMoeda(valorInput);
  aplicarMascaraMoeda(valorPagoInput);

  // ---------- Código de rastreio: até 30 caracteres alfanuméricos ----------
  rastreioInput.addEventListener("input", () => {
    rastreioInput.value = rastreioInput.value.replace(/[^a-zA-Z0-9]/g, "").slice(0, 30);
  });

  // ---------- Data para exibição dd/mm/aa ----------
  function formatarDataExibicao(isoDate){
    if(!isoDate) return "-";
    const [ano, mes, dia] = isoDate.split("-");
    return `${dia}/${mes}/${ano.slice(2)}`;
  }

  // ---------- Envio: valida e abre modal de confirmação ----------
form.addEventListener("submit", (e) => {
  e.preventDefault();
  document.getElementById("fieldCpf").classList.remove("invalid");

  if (!form.checkValidity()) {
    form.reportValidity();
    return;
  }

  // <-- AQUI: nova validação (Prazo ou Data de entrega)
  if (!prazoInput.value.trim() && !dataEntregaInput.value) {
    alert("Preencha o Prazo (dias) ou a Data de entrega (prevista).");
    return;
  }

  if (!cpfValido()) {
    document.getElementById("fieldCpf").classList.add("invalid");
    cpfInput.focus();
    return;
  }

    const v = transportadora.value;
    const dados = {
      cliente: document.getElementById("cliente").value.trim(),
      numeroPedido: document.getElementById("numeroPedido").value,
      dataEnvio: document.getElementById("dataEnvio").value,
      transportadora: v,
      outro: (v === "Outro" || v === "Entrega Loja" || v === "Retirada Loja") ? outroInput.value.trim() : "",
      codigoRastreio: (v === "Correios" || v === "Jadlog") ? rastreioInput.value.trim() : "",
      cpf: v === "Rodonaves" ? cpfInput.value.trim() : "",
      notaFiscal: v === "Rodonaves" ? notaInput.value.trim() : "",
      prazo: prazoInput.value,
      valorFrete: valorInput.value,
      valorPago: valorPagoInput.value,
      dataEntregaPrevista: dataEntregaInput.value,
    };

    const linhas = [
      ["Cliente", dados.cliente],
      ["Pedido", dados.numeroPedido],
      ["Data de envio", formatarDataExibicao(dados.dataEnvio)],
      ["Transportadora", dados.transportadora === "Outro" ? dados.outro : dados.transportadora],
      ["Código de rastreio", dados.codigoRastreio || "-"],
      ["CPF", dados.cpf || "-"],
      ["Nota fiscal", dados.notaFiscal || "-"],
      ["Prazo (dias)", dados.prazo],
      ["Valor do frete", dados.valorFrete],
      ["Valor pago", dados.valorPago],
      ["Data de entrega (prevista)", dataEntregaInput.value ? formatarDataExibicao(dataEntregaInput.value) : "(calculada pelo prazo)"],
    ];

    confirmList.innerHTML = linhas.map(([k, v]) =>
      `<div class="confirm-row"><span class="k">${k}</span><span class="v">${v}</span></div>`
    ).join("");

    overlay.classList.add("show");
    overlay.dataset.payload = JSON.stringify(dados);
  });

  // ---------- Corrigir: fecha modal, mantém os campos preenchidos ----------
  btnCorrigir.addEventListener("click", () => {
    overlay.classList.remove("show");
  });

  // ---------- Confirmar: envia para o Apps Script ----------
  btnConfirmar.addEventListener("click", async () => {
    const dados = JSON.parse(overlay.dataset.payload || "{}");
    console.log("Payload enviado:", dados);   // <-- ADICIONE ESTA LINHA
    btnConfirmar.disabled = true;
    btnConfirmar.textContent = "Enviando...";

    try {
      await fetch(URL_APPS_SCRIPT, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(dados)
      });

      overlay.classList.remove("show");
      statusMsg.textContent = "Dados enviados com sucesso!";
      statusMsg.className = "status-msg show ok";
      form.reset();
      [fieldOutro, fieldRastreio, fieldCpf, fieldNota].forEach(f => f.classList.add("disabled"));
      [outroInput, rastreioInput, cpfInput, notaInput].forEach(i => i.disabled = true);

    } catch (erro) {
      overlay.classList.remove("show");
      statusMsg.textContent = "Erro ao enviar. Tente novamente.";
      statusMsg.className = "status-msg show err";
    } finally {
      btnConfirmar.disabled = false;
      btnConfirmar.textContent = "Enviar";
    }
  });

  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) overlay.classList.remove("show");
  });

  document.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && overlay.classList.contains("show")) {
    e.preventDefault();
    btnConfirmar.click();
  }
});
</script>

</body>
</html>
