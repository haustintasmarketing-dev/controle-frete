<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário de Contato</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #f4f4f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
  }
  .card {
    background: #fff;
    padding: 32px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 420px;
  }
  h1 {
    font-size: 20px;
    margin-bottom: 24px;
    color: #18181b;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #52525b;
    margin-bottom: 6px;
    margin-top: 16px;
  }
  input, textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d4d4d8;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 80px; }
  button {
    margin-top: 24px;
    width: 100%;
    padding: 12px;
    background: #18181b;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  #status {
    margin-top: 16px;
    font-size: 13px;
    text-align: center;
  }
  .sucesso { color: #16a34a; }
  .erro { color: #dc2626; }
</style>
</head>
<body>

<div class="card">
  <h1>Fale com a gente</h1>
  <form id="formContato">
    <label for="nome">Nome</label>
    <input type="text" id="nome" required>

    <label for="email">E-mail</label>
    <input type="email" id="email" required>

    <label for="telefone">Telefone</label>
    <input type="tel" id="telefone" required>

    <label for="mensagem">Mensagem</label>
    <textarea id="mensagem"></textarea>

    <button type="submit" id="btnEnviar">Enviar</button>
    <div id="status"></div>
  </form>
</div>

<script>
  // Substitua pela URL do seu Web App do Apps Script (Passo 3)
  const URL_APPS_SCRIPT = "COLE_AQUI_A_URL_DO_SEU_WEB_APP";

  const form = document.getElementById("formContato");
  const btn = document.getElementById("btnEnviar");
  const status = document.getElementById("status");

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = "Enviando...";
    status.textContent = "";

    const dados = {
      nome: document.getElementById("nome").value,
      email: document.getElementById("email").value,
      telefone: document.getElementById("telefone").value,
      mensagem: document.getElementById("mensagem").value
    };

    try {
      await fetch(URL_APPS_SCRIPT, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(dados)
      });

      // Em modo "no-cors" o navegador não deixa ler a resposta,
      // então tratamos como sucesso se a requisição não estourar erro de rede.
      status.textContent = "Enviado com sucesso!";
      status.className = "sucesso";
      form.reset();

    } catch (erro) {
      status.textContent = "Erro ao enviar. Tente novamente.";
      status.className = "erro";
    } finally {
      btn.disabled = false;
      btn.textContent = "Enviar";
    }
  });
</script>

</body>
</html>
